<div class="recipe-card" [routerLink]="['/recipe', recipe.id]">
  <div class="image-placeholder" [style.backgroundImage]="recipe.imageUrl ? 'url(' + recipe.imageUrl + ')' : 'none'" [style.backgroundColor]="recipe.imageUrl ? 'transparent' : '#e0e0e0'">
    @if (!recipe.imageUrl) {
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #888;">Sem Imagem</div>
    }
  </div>
  <div class="content">
    <h3>{{recipe.title}}</h3>
    <p class="author">Por: {{recipe.user?.name || 'Desconhecido'}}</p>
  </div>
</div>
